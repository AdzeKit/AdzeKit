{% extends "base.html" %}
{% block title_suffix %} - Agent{% endblock %}

{% block head %}
<style>
    /* Override main layout to be full-height flex */
    main {
        max-width: none;
        margin: 0;
        padding: 0;
        height: calc(100vh - 49px);
        display: flex;
    }

    /* ---- Sessions sidebar ---- */
    .sessions-sidebar {
        width: 240px;
        min-width: 240px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .sessions-header {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .sessions-header h2 {
        font-family: var(--mono);
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin: 0;
    }

    .btn-new-chat {
        background: var(--accent-dim);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.25rem 0.6rem;
        font-family: var(--mono);
        font-size: 0.7rem;
        cursor: pointer;
        transition: all 0.15s;
    }

    .btn-new-chat:hover {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
    }

    .sessions-list {
        flex: 1;
        overflow-y: auto;
        padding: 0.25rem 0;
    }

    .session-item {
        display: flex;
        align-items: center;
        padding: 0.5rem 0.75rem;
        cursor: pointer;
        border-left: 2px solid transparent;
        transition: all 0.1s;
        gap: 0.5rem;
    }

    .session-item:hover { background: rgba(201, 162, 39, 0.06); }

    .session-item.active {
        background: rgba(201, 162, 39, 0.12);
        border-left-color: var(--accent);
    }

    .session-item-body { flex: 1; overflow: hidden; }

    .session-date {
        font-family: var(--mono);
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-bottom: 0.1rem;
    }

    .session-preview {
        font-size: 0.8rem;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .session-item.active .session-preview { color: var(--accent); }

    .btn-delete-session {
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 0.8rem;
        cursor: pointer;
        padding: 0.15rem 0.3rem;
        border-radius: 3px;
        opacity: 0;
        transition: all 0.1s;
        flex-shrink: 0;
    }

    .session-item:hover .btn-delete-session { opacity: 1; }
    .btn-delete-session:hover { color: var(--red); background: rgba(239,83,80,0.1); }

    .sessions-empty {
        padding: 1rem;
        color: var(--text-muted);
        font-size: 0.8rem;
        font-style: italic;
        text-align: center;
    }

    /* ---- Chat pane ---- */
    .chat-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 0 2rem;
    }

    .chat-pane-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.75rem 0;
        border-bottom: 1px solid var(--border);
        min-height: 44px;
    }

    .chat-pane-title {
        font-family: var(--mono);
        font-size: 1rem;
        color: var(--accent);
    }

    .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        padding: 0.75rem 0 0.5rem;
    }

    .quick-action {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 0.3rem 0.65rem;
        color: var(--text-muted);
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.15s;
    }

    .quick-action:hover { border-color: var(--accent); color: var(--accent); }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem 0;
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .message {
        max-width: 85%;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        line-height: 1.5;
        white-space: pre-wrap;
    }

    .message-user {
        align-self: flex-end;
        background: var(--accent-dim);
        color: var(--text);
        border-bottom-right-radius: 2px;
    }

    .message-assistant {
        align-self: flex-start;
        background: var(--surface);
        border: 1px solid var(--border);
        border-bottom-left-radius: 2px;
    }

    .message-meta {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-top: 0.35rem;
        font-family: var(--mono);
    }

    .message-error {
        align-self: flex-start;
        background: rgba(239, 83, 80, 0.1);
        border: 1px solid var(--red);
        color: var(--red);
    }

    .chat-input-area {
        display: flex;
        gap: 0.75rem;
        padding: 0.75rem 0 1rem;
        border-top: 1px solid var(--border);
    }

    .chat-input-area textarea {
        flex: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.65rem 1rem;
        color: var(--text);
        font-family: var(--sans);
        font-size: 0.9rem;
        resize: none;
        min-height: 44px;
        max-height: 120px;
        line-height: 1.4;
    }

    .chat-input-area textarea:focus { outline: none; border-color: var(--accent); }
    .chat-input-area textarea::placeholder { color: var(--text-muted); }

    .chat-input-area button {
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: 8px;
        padding: 0.65rem 1.5rem;
        font-family: var(--mono);
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
        align-self: flex-end;
    }

    .chat-input-area button:hover { opacity: 0.9; }
    .chat-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

    .thinking {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        color: var(--text-muted);
        font-size: 0.85rem;
        font-family: var(--mono);
    }

    .thinking-dot {
        width: 6px; height: 6px;
        background: var(--accent);
        border-radius: 50%;
        animation: pulse 1.2s ease-in-out infinite;
    }

    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 768px) {
        main { flex-direction: column; }
        .sessions-sidebar { width: 100%; min-width: unset; max-height: 180px; border-right: none; border-bottom: 1px solid var(--border); }
        .chat-pane { padding: 0 1rem; }
    }
</style>
{% endblock %}

{% block content %}
<!-- Sessions sidebar -->
<div class="sessions-sidebar">
    <div class="sessions-header">
        <h2>sessions</h2>
        <button class="btn-new-chat" onclick="newSession()">+ New</button>
    </div>
    <div class="sessions-list" id="sessions-list">
        <div class="sessions-empty">Loading...</div>
    </div>
</div>

<!-- Chat pane -->
<div class="chat-pane">
    <div class="chat-pane-header">
        <span class="chat-pane-title" id="chat-title">// agent</span>
    </div>

    <div class="quick-actions">
        <button class="quick-action" onclick="sendQuick('Triage my inbox. Show me what needs attention.')">Triage inbox</button>
        <button class="quick-action" onclick="sendQuick('Show me all my open loops and flag anything overdue.')">Check loops</button>
        <button class="quick-action" onclick="sendQuick('Draft replies for any emails that need a response today.')">Draft replies</button>
        <button class="quick-action" onclick="sendQuick('Archive all newsletter and notification emails in my inbox.')">Clean inbox</button>
        <button class="quick-action" onclick="sendQuick('Give me a full status report: projects, loops, and inbox count.')">Status report</button>
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="message message-assistant">
            AdzeKit agent ready. Select a past session or start a new one.
        </div>
    </div>

    <div class="chat-input-area">
        <textarea id="chat-input" placeholder="Ask the agent..." rows="1"></textarea>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const messagesEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const sessionsListEl = document.getElementById('sessions-list');

let currentSessionId = null;
let sessionMessages = [];  // [{role, content, ts, backend?}]

// ---- Session management ---------------------------------------------------

async function loadSessionList() {
    try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        renderSessionList(sessions);
    } catch (err) {
        sessionsListEl.innerHTML = '<div class="sessions-empty">Failed to load.</div>';
    }
}

function renderSessionList(sessions) {
    if (!sessions.length) {
        sessionsListEl.innerHTML = '<div class="sessions-empty">No sessions yet.</div>';
        return;
    }
    sessionsListEl.innerHTML = sessions.map(s => `
        <div class="session-item${s.id === currentSessionId ? ' active' : ''}"
             onclick="openSession('${escapeHtml(s.id)}')"
             data-id="${escapeHtml(s.id)}">
            <div class="session-item-body">
                <div class="session-date">${formatDate(s.created)}</div>
                <div class="session-preview">${escapeHtml(s.preview || '(empty)')}</div>
            </div>
            <button class="btn-delete-session" title="Delete"
                    onclick="deleteSession(event, '${escapeHtml(s.id)}')">✕</button>
        </div>
    `).join('');
}

async function newSession() {
    const res = await fetch('/api/sessions', { method: 'POST' });
    const data = await res.json();
    currentSessionId = data.id;
    sessionMessages = [];
    localStorage.setItem('adzekit-last-session', currentSessionId);
    renderMessages();
    document.getElementById('chat-title').textContent = '// agent — new session';
    await loadSessionList();
    inputEl.focus();
}

async function openSession(id) {
    try {
        const res = await fetch(`/api/sessions/${id}`);
        const data = await res.json();
        currentSessionId = data.id;
        sessionMessages = data.messages || [];
        localStorage.setItem('adzekit-last-session', currentSessionId);
        renderMessages();
        document.getElementById('chat-title').textContent =
            `// agent — ${formatDate(data.created)}`;
        // Update sidebar active state
        document.querySelectorAll('.session-item').forEach(el => {
            el.classList.toggle('active', el.dataset.id === id);
        });
    } catch (err) {
        console.error('Failed to open session:', err);
    }
}

async function deleteSession(event, id) {
    event.stopPropagation();
    if (!confirm('Delete this session?')) return;
    await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
    if (currentSessionId === id) {
        currentSessionId = null;
        sessionMessages = [];
        localStorage.removeItem('adzekit-last-session');
        renderMessages();
        document.getElementById('chat-title').textContent = '// agent';
    }
    await loadSessionList();
}

async function persistSession() {
    if (!currentSessionId) return;
    await fetch(`/api/sessions/${currentSessionId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: sessionMessages }),
    });
}

// ---- Chat -----------------------------------------------------------------

function renderMessages() {
    if (!sessionMessages.length) {
        messagesEl.innerHTML =
            '<div class="message message-assistant">AdzeKit agent ready. What would you like to do?</div>';
        return;
    }
    messagesEl.innerHTML = '';
    for (const m of sessionMessages) {
        addMessageEl(m.content, m.role, m.backend || null);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessageEl(text, role, backend) {
    const el = document.createElement('div');
    el.className = `message message-${role}`;
    el.textContent = text;

    if (role === 'assistant') {
        const parts = [];
        if (backend) parts.push(`via ${backend}`);
        if (parts.length) {
            const meta = document.createElement('div');
            meta.className = 'message-meta';
            meta.textContent = parts.join(' · ');
            el.appendChild(meta);
        }
    }
    messagesEl.appendChild(el);
    return el;
}

inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function sendQuick(text) {
    inputEl.value = text;
    sendMessage();
}

async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Auto-create a session if none is active
    if (!currentSessionId) {
        const res = await fetch('/api/sessions', { method: 'POST' });
        const data = await res.json();
        currentSessionId = data.id;
        sessionMessages = [];
        localStorage.setItem('adzekit-last-session', currentSessionId);
        messagesEl.innerHTML = '';
        await loadSessionList();
    }

    // Record + render user message
    const userMsg = { role: 'user', content: text, ts: new Date().toISOString() };
    sessionMessages.push(userMsg);
    addMessageEl(text, 'user', null);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Thinking indicator with elapsed timer
    const thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking';
    thinkingEl.innerHTML =
        '<div class="thinking-dot"></div><div class="thinking-dot"></div>' +
        '<div class="thinking-dot"></div><span id="thinking-label">Agent working...</span>';
    messagesEl.appendChild(thinkingEl);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    sendBtn.disabled = true;

    let elapsed = 0;
    const timer = setInterval(() => {
        elapsed++;
        const lbl = document.getElementById('thinking-label');
        if (lbl) lbl.textContent = `Agent working... ${elapsed}s`;
    }, 1000);

    // Build history for context (last 10 messages, excluding current)
    const history = sessionMessages.slice(-11, -1).map(m => ({
        role: m.role,
        content: m.content,
    }));

    try {
        const res = await fetch('/api/agent/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, history }),
        });
        clearInterval(timer);
        thinkingEl.remove();

        const data = await res.json();
        if (data.error) {
            addMessageEl(`Error: ${data.error}`, 'error', null);
        } else {
            const asstMsg = {
                role: 'assistant',
                content: data.response,
                ts: new Date().toISOString(),
                backend: data.backend || null,
            };
            sessionMessages.push(asstMsg);
            addMessageEl(data.response, 'assistant', data.backend);
            await persistSession();
            // Refresh sidebar to update preview
            await loadSessionList();
        }
    } catch (err) {
        clearInterval(timer);
        thinkingEl.remove();
        addMessageEl(`Network error: ${err.message}`, 'error', null);
    }

    sendBtn.disabled = false;
    inputEl.focus();
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ---- Utilities ------------------------------------------------------------

function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) +
           ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ---- Init -----------------------------------------------------------------

async function init() {
    await loadSessionList();

    // Restore last active session
    const lastId = localStorage.getItem('adzekit-last-session');
    if (lastId) {
        try {
            await openSession(lastId);
            return;
        } catch (_) {
            localStorage.removeItem('adzekit-last-session');
        }
    }
}

init();
</script>
{% endblock %}
